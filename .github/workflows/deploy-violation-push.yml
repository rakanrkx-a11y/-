name: Deploy push functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/violation-push/**'
      - 'supabase/functions/broadcast-push/**'
      - 'supabase/functions/violation-auto-forward/**'
      - 'supabase/functions/r2-storage/**'
      - 'supabase/functions/send-auth-emails/**'
      - 'supabase/config.toml'
      - 'supabase/email-templates/**'
      - '.github/workflows/deploy-violation-push.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.30.4

      - name: Deploy push functions to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: rizoafuxmqsddjfhbsmf
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::أضف SUPABASE_ACCESS_TOKEN في GitHub → Settings → Secrets → Actions"
            echo "::error::أو انشر يدوياً من Supabase Dashboard → Edge Functions → violation-push"
            exit 1
          fi
          supabase functions deploy violation-push --no-verify-jwt --project-ref "$PROJECT_ID" --use-api
          supabase functions deploy broadcast-push --no-verify-jwt --project-ref "$PROJECT_ID" --use-api
          supabase functions deploy r2-storage --no-verify-jwt --project-ref "$PROJECT_ID" --use-api
          supabase functions deploy send-auth-emails --no-verify-jwt --project-ref "$PROJECT_ID" --use-api
